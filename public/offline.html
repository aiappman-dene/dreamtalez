<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>DreamTalez — No Connection</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #060d1f;
      color: rgba(255,255,255,0.88);
      font-family: system-ui, -apple-system, sans-serif;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 340px;
      padding: 36px 28px;
      border-radius: 24px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .moon { font-size: 52px; margin-bottom: 20px; display: block; }
    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 10px; }
    p {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.6);
      line-height: 1.55;
      margin-bottom: 24px;
    }
    button {
      background: rgba(123,97,255,0.18);
      color: rgba(255,255,255,0.9);
      border: 1px solid rgba(123,97,255,0.35);
      border-radius: 999px;
      padding: 12px 28px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="card">
    <span class="moon">🌙</span>
    <h1>No Connection</h1>
    <p>Check your internet connection and try again. Your saved stories are still there.</p>
    <button id="retry-btn">Try Again</button>
  </div>
  <script src="/offline.js"></script>
</body>
</html>
